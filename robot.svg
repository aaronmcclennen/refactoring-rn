<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- guide lines -->
  <line x1="50" y1="200" x2="750" y2="200" stroke="#222" stroke-width="6" stroke-linecap="round"/>
  <line x1="50" y1="600" x2="750" y2="600" stroke="#222" stroke-width="6" stroke-linecap="round"/>

  <!-- shadow between lines for depth -->
  <ellipse cx="400" cy="630" rx="160" ry="20" fill="#000" opacity="0.06"/>

  <!-- robot group (walking pose) -->
  <g id="robot" transform="translate(300,260)">
    <!-- torso -->
    <rect x="60" y="20" width="160" height="160" rx="16" ry="16" fill="#d0e6ff" stroke="#2b6cb0" stroke-width="6"/>

    <!-- head -->
    <rect x="100" y="-60" width="100" height="80" rx="12" ry="12" fill="#f0f7ff" stroke="#2b6cb0" stroke-width="6"/>
    <circle cx="130" cy="-20" r="10" fill="#2b6cb0"/>
    <circle cx="170" cy="-20" r="10" fill="#2b6cb0"/>
    <rect x="140" y="-5" width="20" height="6" rx="3" fill="#2b6cb0"/>

    <!-- antenna -->
    <line x1="150" y1="-60" x2="150" y2="-84" stroke="#2b6cb0" stroke-width="5" stroke-linecap="round"/>
    <circle cx="150" cy="-92" r="8" fill="#ffad33"/>

    <!-- left arm (swinging back) -->
    <g transform="translate(60,36)">
      <rect x="-10" y="0" width="16" height="88" rx="8" fill="#cde8ff" stroke="#2b6cb0" stroke-width="5" transform="rotate(-18 0 0)"/>
      <circle cx="-2" cy="86" r="14" fill="#2b6cb0"/>
    </g>

    <!-- right arm (swinging forward) -->
    <g transform="translate(260,36)">
      <rect x="-6" y="0" width="16" height="96" rx="8" fill="#cde8ff" stroke="#2b6cb0" stroke-width="5" transform="rotate(26 0 0)"/>
      <circle cx="8" cy="92" r="14" fill="#2b6cb0"/>
    </g>

    <!-- left leg (forward) -->
    <g transform="translate(120,180)">
      <rect x="0" y="0" width="28" height="96" rx="10" fill="#b8dfff" stroke="#2b6cb0" stroke-width="6" transform="rotate(14 0 0)"/>
      <rect x="-6" y="88" width="40" height="18" rx="8" fill="#2b6cb0"/>
    </g>

    <!-- right leg (back) -->
    <g transform="translate(200,180)">
      <rect x="0" y="0" width="28" height="96" rx="10" fill="#b8dfff" stroke="#2b6cb0" stroke-width="6" transform="rotate(-26 0 0)"/>
      <rect x="-6" y="88" width="40" height="18" rx="8" fill="#2b6cb0"/>
    </g>

    <!-- chest details -->
    <rect x="120" y="64" width="56" height="40" rx="8" ry="8" fill="#ffffff" opacity="0.9" stroke="#2b6cb0" stroke-width="3"/>
    <circle cx="150" cy="86" r="6" fill="#ff6b6b"/>
    <rect x="134" y="100" width="32" height="6" rx="3" fill="#2b6cb0"/>

  </g>

  <!-- subtle caption -->
  <text x="400" y="760" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle">Robot walking between the lines</text>

</svg>
